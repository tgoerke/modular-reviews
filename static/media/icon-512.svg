  <circle cx="256" cy="248" r="26" fill="#0c0b0a"/>
  <circle cx="256" cy="248" r="16" fill="#2a1e00"/>
  <circle cx="256" cy="248" r="8"  fill="#e8a020"/>
  <circle cx="256" cy="248" r="3"  fill="#0c0b0a"/>

