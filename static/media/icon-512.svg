  <!-- Jack sockets — bottom-left -->
  <circle cx="111" cy="406" r="24" fill="#0c0b0a"/>
  <circle cx="111" cy="406" r="15" fill="#1a1614"/>
  <circle cx="111" cy="406" r="7"  fill="#8a857e"/>
  <circle cx="111" cy="406" r="3"  fill="#0c0b0a"/>

  <!-- Jack sockets — top-left -->
  <circle cx="111" cy="115" r="24" fill="#0c0b0a"/>
  <circle cx="111" cy="115" r="15" fill="#1a1614"/>
  <circle cx="111" cy="115" r="7"  fill="#8a857e"/>
  <circle cx="111" cy="115" r="3"  fill="#0c0b0a"/>

