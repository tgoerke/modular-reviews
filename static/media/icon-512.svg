  <rect x="8" y="8" width="496" height="496" rx="74" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.06"/>

  <!-- Top rail -->
  <rect x="17" y="44" width="478" height="20" rx="5" fill="#8a857e"/>
  <!-- Bottom rail -->
  <rect x="17" y="448" width="478" height="20" rx="5" fill="#8a857e"/>

  <!-- Mounting screws -->
  <circle cx="43"  cy="54"  r="8" fill="#0c0b0a"/>
  <line   x1="39" y1="54"  x2="47" y2="54"  stroke="#3a3530" stroke-width="2"/>
  <circle cx="469" cy="54"  r="8" fill="#0c0b0a"/>
  <line   x1="465" y1="54" x2="473" y2="54" stroke="#3a3530" stroke-width="2"/>
  <circle cx="43"  cy="458" r="8" fill="#0c0b0a"/>
  <line   x1="39" y1="458" x2="47" y2="458" stroke="#3a3530" stroke-width="2"/>
  <circle cx="469" cy="458" r="8" fill="#0c0b0a"/>
  <line   x1="465" y1="458" x2="473" y2="458" stroke="#3a3530" stroke-width="2"/>

  <!-- Module panel -->
  <rect x="34" y="64" width="444" height="384" fill="#c4a882"/>

  <!-- Glow layers -->
  <path d="M 111 406 C 77 307,77 196,111 115 C 137 115,213 188,256 248"
