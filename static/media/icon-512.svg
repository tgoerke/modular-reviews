  <!-- Cables -->
  <path d="M 111 406 C 77 307,77 196,111 115 C 137 115,213 188,256 248"
        fill="none" stroke="#e63946" stroke-width="15" stroke-linecap="round"/>
  <path d="M 256 248 C 299 188,375 115,401 115 C 435 196,435 307,401 406"
