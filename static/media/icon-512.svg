  <circle cx="401" cy="115" r="24" fill="#0c0b0a"/>
  <circle cx="401" cy="115" r="15" fill="#1a1614"/>
  <circle cx="401" cy="115" r="7"  fill="#8a857e"/>
  <circle cx="401" cy="115" r="3"  fill="#0c0b0a"/>

